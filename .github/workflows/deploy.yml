name: Discreta CI/CD

on:
  push:
    branches:
      - staging
    tags:
      - "v*"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy Staging
        if: github.ref == 'refs/heads/staging'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd /home/ec2-user/app/Discreta/discreta/lib/app/src/2_Back_end
            git reset --hard
            git checkout staging
            git pull origin staging
            echo "${{ secrets.ENV_FILE_STAGING }}" > .env
            npm install
            npm run build
            docker stop discreta_staging || true
            docker compose build staging --no-cache
            docker compose up -d staging

      - name: Deploy Production
        if: startsWith(github.ref, 'refs/tags/v')
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd /home/ec2-user/app/Discreta/discreta/lib/app/src/2_Back_end
            git reset --hard
            git checkout main
            git pull origin main
            echo "${{ secrets.ENV_FILE_PRODUCTION }}" > .env
            npm install
            npm run build
            docker stop discreta_production || true
            docker compose build production --no-cache
            docker compose up -d production
